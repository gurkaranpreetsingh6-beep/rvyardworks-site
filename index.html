<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Website Not Found</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: #eee;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 120px;
      font-weight: 600;
      color: #2e7d32;
    }

    h2 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #333;
      margin-bottom: 20px;
    }

    .contact {
      font-size: 15px;
      color: #2e7d32;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: 0.3s ease;
    }

   

    .illustration {
      font-size: 50px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="illustration">🌿</div>
    <h1>404</h1>
    <h2>Website Not Found</h2>
    <p>The Website you're looking for might have been removed or is temporarily unavailable.</p>

    <p class="contact">
      Connect with Admin
  </p>
  </div>
</body>
</html>
